services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SMSHUBNEXT_LOAD_SQL_PASSWORD:-SmsHubNext_load_2026!}
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - smshubnext_load_sql:/var/opt/mssql

  app:
    build:
      context: ../..
      dockerfile: tests/SmsHubNext.LoadTests/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Testing
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SmsHubNext: Server=sqlserver,1433;Database=SmsHubNextLoad;User ID=sa;Password=${SMSHUBNEXT_LOAD_SQL_PASSWORD:-SmsHubNext_load_2026!};TrustServerCertificate=true;Encrypt=true;Application Name=SmsHubNext.LoadTests
      DataProtection__KeyRingPath: /tmp/smshubnext-load-keys
      OpenApi__Enabled: "false"
      Dispatch__PollInterval: 00:00:00.050
      DeliveryReportPolling__PollInterval: 00:00:00.250
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5081:8080"

  seed:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: ${SMSHUBNEXT_LOAD_SQL_PASSWORD:-SmsHubNext_load_2026!}
    volumes:
      - ./sql:/load/sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -C
        -d SmsHubNextLoad -b -i /load/sql/seed.sql

  k6:
    image: grafana/k6:2.1.0
    environment:
      BASE_URL: http://app:8080
      API_KEY: smshub-load-test-key-2026
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    command:
      - run
      - --summary-export=/results/smoke-summary.json
      - /scripts/smoke.js

  capacity:
    image: grafana/k6:2.1.0
    environment:
      BASE_URL: ${SMSHUBNEXT_LOAD_BASE_URL:-http://app:8080}
      API_KEY: ${SMSHUBNEXT_LOAD_API_KEY:-smshub-load-test-key-2026}
      SENDER_LINE: ${SMSHUBNEXT_LOAD_SENDER_LINE:-300099999999}
      MESSAGE_TYPE_ID: ${SMSHUBNEXT_LOAD_MESSAGE_TYPE_ID:-250}
      MODE: ${SMSHUBNEXT_LOAD_MODE:-stress}
      BATCH_SIZE: ${SMSHUBNEXT_LOAD_BATCH_SIZE:-100}
      START_RATE: ${SMSHUBNEXT_LOAD_START_RATE:-2}
      TARGET_RATE: ${SMSHUBNEXT_LOAD_TARGET_RATE:-20}
      SOAK_RATE: ${SMSHUBNEXT_LOAD_SOAK_RATE:-5}
      SOAK_DURATION: ${SMSHUBNEXT_LOAD_SOAK_DURATION:-1h}
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    command:
      - run
      - --summary-export=/results/capacity-summary.json
      - /scripts/capacity.js

  verify:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: ${SMSHUBNEXT_LOAD_SQL_PASSWORD:-SmsHubNext_load_2026!}
    volumes:
      - ./sql:/load/sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/mssql-tools18/bin/sqlcmd
        -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -C
        -d SmsHubNextLoad -b -i /load/sql/verify-invariants.sql

volumes:
  smshubnext_load_sql:
